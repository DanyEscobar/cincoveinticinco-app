<div class="d-flex flex-column">
  <app-breadcrumbs
    [url]="'/dashboard/users'"
    [page]="'Usuarios'"
    [titulo]="actionType()"
  ></app-breadcrumbs>
  <div class="card shadow-sm border-0 container">
    <div class="card-header bg-white py-3">
      <h5 class="mb-0">Editar Usuario</h5>
    </div>
    <div class="card-body">
      <form [formGroup]="form">
        @if (userConfig()) {
          <app-dynamic-form
            [formGroupName]="'userConfig'"
            [config]="userConfig()!"
            [actionType]="actionType()"
            (changeSelectEvent)="changeSelect($event)"
            (submitEvent)="handleEvent($event)"
            (formReady)="formReady()"
          ></app-dynamic-form>
        }
      </form>
    </div>
  </div>
</div>
